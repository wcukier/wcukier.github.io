<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="${csspath}images/planet_logo.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$ · Wolf Cukier</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="${csspath}css/main.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a class="nav-name" href="${csspath}">Wolf Cukier</a>
      <ul class="nav-links">
        <li><a href="${csspath}research/">Research</a></li>
        <li><a href="${csspath}blog/" class="active">Blog</a></li>
        <li><a href="${csspath}files/cv.pdf">CV</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-wrapper">
    <main class="content">

      <div class="post-header" style="text-align:center;">
        <h1>$title$</h1>
      </div>

      <div class="section-rule"><img class="section-planet" src="${csspath}images/planet_logo.svg" alt=""></div>
      <div style="text-align:center; margin-bottom:0;"><span class="post-date">$date$</span></div>
      <a class="rss-link" style="margin:-0.4rem 0 0;" href="${csspath}blog/feed.xml">RSS Feed</a>

      <div class="prose">
        $body$
      </div>

    </main>
  </div>

  <footer>
    <span>Wolf Cukier</span>
    <span>wolfcukier.com</span>
    <span><a href="${csspath}blog/" style="color:inherit;text-decoration:none;">← all posts</a></span>
  </footer>

</body>
</html>
